name: Deploy Alfonso Ugarte Web

on:
  push:
    branches:
      - main 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies 🔧
        run: npm install --legacy-peer-deps

      - name: Build Project 🏗️
        run: npm run build -- --base-href /portal-ullulluco/ 

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # CAMBIO AQUÍ: Se eliminó /browser al final
          folder: dist/alfonso-ugarte-ullulluco 
          branch: gh-pages