<div class="comments-container">
  <h4>Comentarios de la Comunidad</h4>

  <div class="login-prompt" *ngIf="!(authService.user$ | async)">
    <p>Para participar en la historia de Ullulluco, inicia sesión.</p>
    <button (click)="login()" class="btn-google">Ingresar con Google para comentar</button>
  </div>

  <div class="add-comment" *ngIf="authService.user$ | async as user">
    <div class="user-info">
      <img [src]="user.photoURL" alt="avatar" />
      <span>Comentando como <b>{{ user.displayName }}</b></span>
    </div>
    <textarea [(ngModel)]="nuevoTexto" placeholder="Escribe un comentario respetuoso..."></textarea>
    <button (click)="enviarComentario(user)" [disabled]="!nuevoTexto">Publicar</button>
  </div>

  <div class="comments-list">
    <ng-container *ngIf="authService.user$ | async as currentUser">
      <div class="comment-item" *ngFor="let c of comentarios$ | async">
        <img [src]="c.userPhoto || 'assets/default-avatar.png'" alt="Avatar" />

        <div class="content">
          <header>
            <strong>{{ c.userName }}</strong>
            
            <div class="header-right">
              <small>{{ c.fecha?.toDate() | date: 'short' }}</small>
              
              <div class="actions" *ngIf="c.userId === currentUser.uid && comentarioEditandoId !== c.id">
                <button (click)="activarEdicion(c)" class="btn-action edit" title="Editar">✏️</button>
                <button (click)="eliminarComentario(c.id)" class="btn-action delete" title="Eliminar">&times;</button>
              </div>
            </div>
          </header>

          <div class="edit-mode-container" *ngIf="comentarioEditandoId === c.id">
            <textarea [(ngModel)]="textoEditado" class="edit-textarea"></textarea>
            <div class="edit-actions">
              <button (click)="guardarEdicion(c.id)" [disabled]="!textoEditado.trim()" class="btn-save">Guardar</button>
              <button (click)="cancelarEdicion()" class="btn-cancel">Cancelar</button>
            </div>
          </div>

          <p *ngIf="comentarioEditandoId !== c.id">{{ c.texto }}</p>
        </div>
      </div>
    </ng-container>
    
    <ng-container *ngIf="!(authService.user$ | async)">
      <div class="comment-item" *ngFor="let c of comentarios$ | async">
        <img [src]="c.userPhoto || 'assets/default-avatar.png'" alt="Avatar" />
        <div class="content">
          <header>
            <strong>{{ c.userName }}</strong>
            <small>{{ c.fecha?.toDate() | date: 'short' }}</small>
          </header>
          <p>{{ c.texto }}</p>
        </div>
      </div>
    </ng-container>
  </div>
</div>
